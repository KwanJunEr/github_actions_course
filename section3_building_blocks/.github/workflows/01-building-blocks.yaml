name: 01 - Building Blocks 

on: push

jobs:
    echo-hello:
        runs-on: ubuntu-latest
        steps:
            - name: Say Hello
              run: echo "Hello, world!" #Needs to be the same level as name
    
    echo-goodbye:
        runs-on: ubuntu-latest
        steps: 
            - name: Failed step 
              run: |
                echo "I will fail"
                exit 1
            - name: Say goodbye
              run: echo "Goodbye"